name: Sync SIROS Cache

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install requests

      - name: Executar sync SIROS
        run: python sync_siros.py

      - name: Commitar siros_cache.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add siros_cache.json
          git diff --cached --quiet || git commit -m "sync: SIROS $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
